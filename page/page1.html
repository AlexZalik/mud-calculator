    <meta charset="UTF-8">

	<title>MUDCalculator</title>
	<link rel="stylesheet" href="../style/reset.css" />
	<link rel="stylesheet" href="../style/style.css" />

</head>
<body>
	<div class="app">
		<div class="menu-toggle">
			<div class="hamburger">
				<span></span>
			</div>
		</div>

		<aside class="sidebar">
			
			<nav class="menu">
                <a href="../index.html" class="menu-item">ГОЛОВНА СТОРІНКА</a>
				<a href="../page/page1.html" class="menu-item is-active">CПІВВІДНОШЕННЯ</a>
				<a href="../page/page2.html" class="menu-item">КАРБОНАТНА ЛУЖНІСТЬ</a>
				<a href="../page/page3.html" class="menu-item">РЕОЛОГІЯ</a>
				<a href="../page/page4.html" class="menu-item">ВМІСТ ІОНІВ Са<sup>2+</sup> ТА Mg<sup>2+</sup></a>
				<a href="../page/page5.html" class="menu-item">ХЛОРИДИ</a>
				<a href="../page/page6.html" class="menu-item">MBT</a>
				<a href="../page/page7.html" class="menu-item">ОБВАЖНЕННЯ</a>
				<a href="../page/page8.html" class="menu-item">ЗМІНА ГУСТИНИ</a>
				<a href="../page/page9.html" class="menu-item">НЕОБХІДНА ГУСТИНА</a>
				<a href="../page/page10.html" class="menu-item">ЛІМІТ ГУСТИНИ</a>

			</nav>
            <ul class="logout">


		</aside>

		<main class="content">
			<h1>СПІВІДНОШЕННЯ ВОДА/ДП</h1>
				<div class="container">
					<div class="box">
						<p>Введіть вміст води, %</p>
						<input type="text" id="test-input_1"/>
					</div>
					<div class="box">
						<p>Введіть вміст твердої фази, %</p>
						<input type="text" id="test-input_2"/>
					</div>
					<div class="box">
						<button class="button-46" role="button" id="submit-button" type="submit" onclick="ratio()">РОЗРАХУНОК</button>
					</div>
					<div class="box">
						<div id="test-output_5"></div>
						<div id="test-output_1"></div>
						<div id="test-output_2"></div>
						<div id="test-output_3"></div>
						<div id="test-output_4"></div>
					</div>
					<div class="box">	
						<p>© 2026</p>
						<p><strong>Олександр Заліський</strong></p>
						<a href="https://gse.ua" class="special-link" target="_blank" rel="noopener noreferrer">www.gse.ua</a>
					</div>
				</div>
		</main>
	</div>



	<script>
		const menu_toggle = document.querySelector('.menu-toggle');
		const sidebar = document.querySelector('.sidebar');
	
		menu_toggle.addEventListener('click', () => {
			menu_toggle.classList.toggle('is-active');
			sidebar.classList.toggle('is-active');
		});
	
		function ratio() {
			// Отримуємо значення з полів вводу
			var input1 = parseFloat(document.getElementById('test-input_1').value);
			var input2 = parseFloat(document.getElementById('test-input_2').value);
	
			// Очищаємо повідомлення про помилку і результати попередніх розрахунків
			document.getElementById('test-output_1').textContent = '';
			document.getElementById('test-output_2').textContent = '';
			document.getElementById('test-output_3').textContent = '';
			document.getElementById('test-output_4').textContent = '';
			document.getElementById('test-output_5').textContent = '';
	
			// Перевірка на числові значення
			if (!isNaN(input1) && !isNaN(input2)) {
				// Виконуємо математичні операції
				var result_1 = 100 - input1 - input2;
	
				var result_2 = ((input1 * 100) / (input1 + (100 - input1 - input2)));
	
				var result_3 = (100 - ((input1 * 100) / (input1 + (100 - input1 - input2))));
	
				// Округлюємо результати до десятих
				var roundedResult_1 = result_1.toFixed(1);
				var roundedResult_2 = result_2.toFixed(1);
				var roundedResult_3 = result_3.toFixed(1);
	
				// Форматуємо результати в потрібний рядок
				var formattedResult = roundedResult_2 + ' / ' + roundedResult_3;
	
				// Виводимо результати в test-output
				document.getElementById('test-output_1').textContent = 'Вміст ДП:';
				document.getElementById('test-output_2').textContent = roundedResult_1 + ' %';
				document.getElementById('test-output_3').textContent = 'Cпівідношення ВОДА / ОЛІЯ (W/O):';
				document.getElementById('test-output_4').textContent = formattedResult;
			} else {
				// Виводимо повідомлення про помилку, якщо введені дані не є числовими
				document.getElementById('test-output_5').textContent = 'Введіть числові значення';
			}
		}
	
		// Додавання обробників подій на поля вводу для видалення повідомлення про помилку
		document.getElementById('test-input_1').addEventListener('input', function () {
			document.getElementById('test-output_1').textContent = '';
			document.getElementById('test-output_2').textContent = '';
			document.getElementById('test-output_3').textContent = '';
			document.getElementById('test-output_4').textContent = '';
			document.getElementById('test-output_5').textContent = '';
		});
	
		document.getElementById('test-input_2').addEventListener('input', function () {
			document.getElementById('test-output_1').textContent = '';
			document.getElementById('test-output_2').textContent = '';
			document.getElementById('test-output_3').textContent = '';
			document.getElementById('test-output_4').textContent = '';
			document.getElementById('test-output_5').textContent = '';
		});
	</script>
	

</body>
</html>
